openapi: 3.0.3
x-document-status: Approved
x-approved-by: Bhajan Lal (Product Owner)
x-approved-date: 2026-06-27
x-owner: API Governance + .NET Architect
x-created-date: 2026-06-27
info:
  title: HRMS AI Platform API
  version: 1.0.0
  description: >
    Phase 6D OpenAPI specification for governed AI platform endpoints. Covers AI
    conversations, stateless ask, knowledge ingestion, evaluation, deployment-bundle
    governance, operational disablement, cache namespace rotation, DR exercise status,
    and retention reconciliation status. The contract preserves tenant isolation,
    RBAC/ABAC, audit, no direct AI business-state mutation, and provider independence.
servers:
  - url: /api/v1
    description: Version 1 API base path
security:
  - bearerAuth: []
tags:
  - name: AI Conversations
  - name: AI Ask
  - name: AI Knowledge
  - name: AI Batch
  - name: AI Evaluation
  - name: AI Governance
  - name: AI Operations
  - name: AI Cache
  - name: AI Disaster Recovery
  - name: AI Retention

paths:
  /ai/health:
    get:
      tags: [AI Operations]
      summary: Get tenant-safe AI health summary
      operationId: getAiHealth
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: AI health summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiHealthResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - AI.Operations.View

  /ai/conversations:
    get:
      tags: [AI Conversations]
      summary: List authorized AI conversations
      operationId: listAiConversations
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            type: string
            enum: [Active, Closed, Reset, Expired]
        - name: purposeKey
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiConversationListResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - AI.Conversation.View
    post:
      tags: [AI Conversations]
      summary: Create a purpose-scoped AI conversation
      operationId: createAiConversation
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAiConversationRequest"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiConversationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/PolicyDenied"
      x-permissions:
        - AI.Conversation.Create
      x-audit-events:
        - AiConversationCreated

  /ai/conversations/{conversationId}:
    get:
      tags: [AI Conversations]
      summary: Get AI conversation metadata
      operationId: getAiConversation
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "200":
          description: Conversation metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiConversationResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      x-permissions:
        - AI.Conversation.View

  /ai/conversations/{conversationId}/messages:
    post:
      tags: [AI Conversations]
      summary: Send a message to an AI conversation
      operationId: createAiConversationMessage
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/ConversationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAiMessageRequest"
      responses:
        "200":
          description: Governed AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAnswerResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/PolicyDenied"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      x-permissions:
        - AI.Conversation.Message
      x-audit-events:
        - AiRequestCompleted
        - AiSafetyBlocked

  /ai/conversations/{conversationId}/messages/stream:
    post:
      tags: [AI Conversations]
      summary: Stream a governed AI conversation response using Server-Sent Events
      operationId: streamAiConversationMessage
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/ConversationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAiMessageRequest"
      responses:
        "200":
          description: SSE stream with ai.started, ai.delta, ai.citation, ai.confidence, ai.warning, ai.completed, ai.error, and ai.cancelled events
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/RateLimitReset"
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream. Each event data payload is a JSON AiStreamEvent.
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/PolicyDenied"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      x-permissions:
        - AI.Conversation.Message
      x-stream-events:
        - ai.started
        - ai.delta
        - ai.citation
        - ai.confidence
        - ai.warning
        - ai.completed
        - ai.error
        - ai.cancelled
      x-audit-events:
        - AiStreamStarted
        - AiStreamCompleted
        - AiStreamCancelled

  /ai/conversations/{conversationId}/reset:
    post:
      tags: [AI Conversations]
      summary: Reset active memory for a conversation
      operationId: resetAiConversation
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/ConversationId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Conversation reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiConversationResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
      x-permissions:
        - AI.Conversation.Reset
      x-audit-events:
        - AiConversationReset

  /ai/ask:
    post:
      tags: [AI Ask]
      summary: Submit a stateless governed AI question
      operationId: askAi
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiAskRequest"
      responses:
        "200":
          description: Governed AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAnswerResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/PolicyDenied"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      x-permissions:
        - AI.Ask
      x-audit-events:
        - AiRequestCompleted
        - AiSafetyBlocked

  /ai/ask/stream:
    post:
      tags: [AI Ask]
      summary: Stream a stateless governed AI response using Server-Sent Events
      operationId: streamAiAsk
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiAskRequest"
      responses:
        "200":
          description: SSE stream with governed AI response events
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/RateLimitReset"
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream. Each event data payload is a JSON AiStreamEvent.
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/PolicyDenied"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      x-permissions:
        - AI.Ask
      x-stream-events:
        - ai.started
        - ai.delta
        - ai.citation
        - ai.confidence
        - ai.warning
        - ai.completed
        - ai.error
        - ai.cancelled
      x-audit-events:
        - AiStreamStarted
        - AiStreamCompleted
        - AiStreamCancelled

  /ai/batch:
    post:
      tags: [AI Batch]
      summary: Execute multiple independent governed AI requests
      operationId: executeAiBatch
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiBatchRequest"
      responses:
        "200":
          description: Batch processed with per-item results
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/RateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/RateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/RateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiBatchResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/PolicyDenied"
        "429":
          $ref: "#/components/responses/RateLimited"
      x-permissions:
        - AI.Batch.Execute
      x-audit-events:
        - AiBatchRequested
        - AiBatchItemCompleted

  /ai/knowledge/sources:
    get:
      tags: [AI Knowledge]
      summary: List AI knowledge sources
      operationId: listAiKnowledgeSources
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Search"
        - name: status
          in: query
          schema:
            type: string
            enum: [Draft, Validating, Approved, Published, Superseded, Retired]
      responses:
        "200":
          description: Knowledge sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeSourceListResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - AI.Knowledge.View
    post:
      tags: [AI Knowledge]
      summary: Register an AI knowledge source
      operationId: createAiKnowledgeSource
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKnowledgeSourceRequest"
      responses:
        "201":
          description: Knowledge source registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeSourceResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/PolicyDenied"
      x-permissions:
        - AI.Knowledge.Manage
      x-audit-events:
        - AiKnowledgeSourceRegistered

  /ai/knowledge/sources/bulk:
    post:
      tags: [AI Knowledge]
      summary: Register multiple AI knowledge sources
      operationId: bulkCreateAiKnowledgeSources
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkKnowledgeSourceRequest"
      responses:
        "200":
          description: Bulk source registration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkKnowledgeOperationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
      x-permissions:
        - AI.Knowledge.Manage
      x-audit-events:
        - AiKnowledgeBulkOperationRequested

  /ai/knowledge/sources/bulk/validate:
    post:
      tags: [AI Knowledge]
      summary: Validate multiple AI knowledge source versions
      operationId: bulkValidateAiKnowledgeSourceVersions
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkKnowledgeVersionOperationRequest"
      responses:
        "202":
          description: Bulk validation accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkKnowledgeOperationResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
      x-permissions:
        - AI.Knowledge.Manage
      x-audit-events:
        - AiKnowledgeBulkOperationRequested

  /ai/knowledge/sources/bulk/publish:
    post:
      tags: [AI Knowledge]
      summary: Publish multiple validated AI knowledge source versions
      operationId: bulkPublishAiKnowledgeSourceVersions
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkKnowledgeVersionOperationRequest"
      responses:
        "202":
          description: Bulk publication accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkKnowledgeOperationResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/PolicyDenied"
      x-permissions:
        - AI.Knowledge.Publish
      x-audit-events:
        - AiKnowledgeBulkOperationRequested
        - AiIndexPromotionRequested

  /ai/knowledge/sources/bulk/archive:
    post:
      tags: [AI Knowledge]
      summary: Archive or retire multiple AI knowledge sources
      operationId: bulkArchiveAiKnowledgeSources
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkKnowledgeSourceIdsRequest"
      responses:
        "202":
          description: Bulk archive accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkKnowledgeOperationResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/PolicyDenied"
      x-permissions:
        - AI.Knowledge.Manage
      x-audit-events:
        - AiKnowledgeBulkOperationRequested

  /ai/knowledge/sources/bulk/metadata:
    patch:
      tags: [AI Knowledge]
      summary: Update approved metadata for multiple AI knowledge sources
      operationId: bulkUpdateAiKnowledgeSourceMetadata
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkKnowledgeMetadataUpdateRequest"
      responses:
        "200":
          description: Bulk metadata update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkKnowledgeOperationResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/PolicyDenied"
      x-permissions:
        - AI.Knowledge.Manage
      x-audit-events:
        - AiKnowledgeBulkOperationRequested

  /ai/knowledge/sources/{sourceId}/versions:
    post:
      tags: [AI Knowledge]
      summary: Create a new knowledge source version
      operationId: createAiKnowledgeSourceVersion
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/SourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKnowledgeVersionRequest"
      responses:
        "201":
          description: Source version created and staged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJobResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      x-permissions:
        - AI.Knowledge.Manage
      x-audit-events:
        - AiKnowledgeVersionCreated

  /ai/knowledge/sources/{sourceId}/versions/{versionId}/validate:
    post:
      tags: [AI Knowledge]
      summary: Validate a staged knowledge source version
      operationId: validateAiKnowledgeSourceVersion
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/SourceId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "202":
          description: Validation job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJobResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
      x-permissions:
        - AI.Knowledge.Manage
      x-audit-events:
        - AiKnowledgeValidationRequested

  /ai/knowledge/sources/{sourceId}/versions/{versionId}/publish:
    post:
      tags: [AI Knowledge]
      summary: Publish a validated knowledge source version
      operationId: publishAiKnowledgeSourceVersion
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/SourceId"
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishKnowledgeVersionRequest"
      responses:
        "202":
          description: Publication and index workflow accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJobResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/PolicyDenied"
      x-permissions:
        - AI.Knowledge.Publish
      x-audit-events:
        - AiKnowledgeVersionPublished
        - AiIndexPromotionRequested

  /ai/knowledge/ingestion-jobs/{jobId}:
    get:
      tags: [AI Knowledge]
      summary: Get AI knowledge ingestion job status
      operationId: getAiIngestionJob
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Ingestion job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJobResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      x-permissions:
        - AI.Knowledge.View

  /ai/evaluations/runs:
    get:
      tags: [AI Evaluation]
      summary: List AI evaluation runs
      operationId: listAiEvaluationRuns
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: useCaseKey
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [Queued, Running, Passed, Failed, Cancelled, Expired]
      responses:
        "200":
          description: Evaluation runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationRunListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - AI.Evaluation.View
    post:
      tags: [AI Evaluation]
      summary: Start an AI evaluation run
      operationId: startAiEvaluationRun
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEvaluationRunRequest"
      responses:
        "202":
          description: Evaluation run accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationRunResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/PolicyDenied"
      x-permissions:
        - AI.Evaluation.Manage
      x-audit-events:
        - AiEvaluationRunStarted

  /ai/evaluations/runs/{runId}:
    get:
      tags: [AI Evaluation]
      summary: Get AI evaluation run details
      operationId: getAiEvaluationRun
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Evaluation run details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationRunResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      x-permissions:
        - AI.Evaluation.View

  /ai/governance/bundles:
    get:
      tags: [AI Governance]
