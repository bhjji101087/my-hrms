        "404":
          $ref: "#/components/responses/NotFound"
      x-permissions:
        - AI.Retention.View

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  headers:
    RateLimitLimit:
      description: Tenant-safe request or operation-unit limit for the current window.
      schema:
        type: integer
        minimum: 0
    RateLimitRemaining:
      description: Tenant-safe remaining request or operation units in the current window.
      schema:
        type: integer
        minimum: 0
    RateLimitReset:
      description: UTC epoch seconds when the current rate-limit window resets.
      schema:
        type: integer
        minimum: 0
    RetryAfter:
      description: Seconds after which retry may be attempted.
      schema:
        type: integer
        minimum: 0

  parameters:
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 25
    Search:
      name: search
      in: query
      required: false
      schema:
        type: string
        maxLength: 200
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SourceId:
      name: sourceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BundleId:
      name: bundleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DisablementId:
      name: disablementId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthenticated:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: Permission, tenant, ABAC, or policy denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found or not visible to caller
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: Conflict, stale version, duplicate idempotency key, or invalid transition
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    PolicyDenied:
      description: AI policy, retention, safety, budget, evaluation, or lifecycle gate denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RateLimited:
      description: Rate, quota, or budget limit exceeded
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/RateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/RateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/RateLimitReset"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ServiceUnavailable:
      description: AI capability unavailable or degraded
      headers:
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    ErrorEnvelope:
      type: object
      required: [success, message, errors]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorItem"
        correlationId:
          type: string
    ErrorItem:
      type: object
      properties:
        field:
          type: string
          nullable: true
        code:
          type: string
          example: AI_POLICY_DENIED
        message:
          type: string
    PageInfo:
      type: object
      required: [number, size, total]
      properties:
        number:
          type: integer
        size:
          type: integer
        total:
          type: integer
    ReasonRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 1000
        approvalReference:
          type: string
          maxLength: 200

    AiHealthResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/AiHealth"
    AiHealth:
      type: object
      properties:
        status:
          type: string
          enum: [Healthy, Degraded, Disabled, Unavailable]
        degradedMode:
          type: string
          nullable: true
        activeDisablementCount:
          type: integer
        dependencyStatus:
          type: array
          items:
            $ref: "#/components/schemas/AiDependencyStatus"
    AiDependencyStatus:
      type: object
      properties:
        dependency:
          type: string
        status:
          type: string
          enum: [Healthy, Degraded, Disabled, Unavailable, Unknown]

    CreateAiConversationRequest:
      type: object
      required: [purposeKey]
      properties:
        purposeKey:
          type: string
          maxLength: 100
        locale:
          type: string
          maxLength: 20
        metadata:
          type: object
          additionalProperties:
            type: string
    AiConversation:
      type: object
      properties:
        conversationId:
          type: string
          format: uuid
        purposeKey:
          type: string
        memoryMode:
          type: string
          enum: [Disabled, SessionOnly, SessionAndSummary]
        status:
          type: string
          enum: [Active, Closed, Reset, Expired]
        createdDate:
          type: string
          format: date-time
        lastActivityDate:
          type: string
          format: date-time
          nullable: true
    AiConversationResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/AiConversation"
    AiConversationListResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/AiConversation"
            page:
              $ref: "#/components/schemas/PageInfo"

    CreateAiMessageRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 8000
        clientMessageId:
          type: string
          maxLength: 128
        responseMode:
          $ref: "#/components/schemas/AiResponseMode"
    AiAskRequest:
      type: object
      required: [purposeKey, question]
      properties:
        purposeKey:
          type: string
        question:
          type: string
          minLength: 1
          maxLength: 8000
        locale:
          type: string
          maxLength: 20
        responseMode:
          $ref: "#/components/schemas/AiResponseMode"
    AiStreamEvent:
      type: object
      description: JSON payload carried in the data field of a Server-Sent Event.
      properties:
        event:
          type: string
          enum: [ai.started, ai.delta, ai.citation, ai.confidence, ai.warning, ai.completed, ai.error, ai.cancelled]
        requestId:
          type: string
        sequence:
          type: integer
        data:
          type: object
          additionalProperties: true
    AiBatchRequest:
      type: object
      required: [requests]
      properties:
        requests:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/AiBatchItemRequest"
    AiBatchItemRequest:
      type: object
      required: [clientRequestId, purposeKey, question]
      properties:
        clientRequestId:
          type: string
          minLength: 1
          maxLength: 128
        purposeKey:
          type: string
        question:
          type: string
          minLength: 1
          maxLength: 8000
        locale:
          type: string
          maxLength: 20
        responseMode:
          $ref: "#/components/schemas/AiResponseMode"
    AiBatchResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/AiBatchItemResult"
            requestedCount:
              type: integer
            succeededCount:
              type: integer
            failedCount:
              type: integer
    AiBatchItemResult:
      type: object
      properties:
        clientRequestId:
          type: string
        status:
          type: string
          enum: [Succeeded, Failed, Refused, EscalationRequired, RateLimited, BudgetDenied]
        answer:
          $ref: "#/components/schemas/AiAnswer"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorItem"
    AiResponseMode:
      type: string
      enum: [AnswerWithCitations, DraftOnly, RetrievalOnly]
      default: AnswerWithCitations
    AiAnswerResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/AiAnswer"
    AiAnswer:
      type: object
      properties:
        answer:
          type: string
        responseStatus:
          type: string
          enum: [Answered, Refused, EscalationRequired, Degraded]
        refusalReason:
          type: string
          nullable: true
        citations:
          type: array
          items:
            $ref: "#/components/schemas/AiCitation"
        confidence:
          $ref: "#/components/schemas/AiConfidence"
        versions:
          $ref: "#/components/schemas/AiResponseVersions"
        auditReference:
          type: string
    AiCitation:
      type: object
      properties:
        sourceId:
          type: string
          format: uuid
        documentId:
          type: string
        section:
          type: string
        title:
          type: string
        effectiveFrom:
          type: string
          format: date
          nullable: true
        effectiveTo:
          type: string
          format: date
          nullable: true
    AiConfidence:
      type: object
      properties:
        band:
          type: string
          enum: [High, Medium, Low, Refuse]
        score:
          type: number
          format: double
          minimum: 0
          maximum: 1
        citationCompleteness:
          type: number
          format: double
    AiResponseVersions:
      type: object
      properties:
        promptVersion:
          type: string
        modelRegistryVersion:
          type: string
        indexVersion:
          type: string
        safetyPolicyVersion:
          type: string
        memoryPolicyVersion:
          type: string
          nullable: true
        cachePolicyVersion:
          type: string
          nullable: true

    CreateKnowledgeSourceRequest:
      type: object
      required: [sourceType, title, classification, ownerUserId]
      properties:
        sourceType:
          type: string
          enum: [PolicyDocument, Handbook, SOP, FAQ, ComplianceReference, OtherApprovedSource]
        title:
          type: string
          maxLength: 200
        classification:
          type: string
          enum: [Public, Internal, Confidential, Restricted]
        jurisdiction:
          type: string
          maxLength: 50
        locale:
          type: string
          maxLength: 20
        effectiveFrom:
          type: string
          format: date
          nullable: true
        effectiveTo:
          type: string
          format: date
          nullable: true
        ownerUserId:
          type: string
          format: uuid
        retentionPolicyKey:
          type: string
          maxLength: 100
    BulkKnowledgeSourceRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            allOf:
              - $ref: "#/components/schemas/CreateKnowledgeSourceRequest"
              - type: object
                required: [clientItemId]
                properties:
                  clientItemId:
                    type: string
                    maxLength: 128
    BulkKnowledgeVersionOperationRequest:
      type: object
      required: [items, reason]
      properties:
        reason:
          type: string
          maxLength: 1000
        approvalReference:
          type: string
          maxLength: 200
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required: [clientItemId, sourceId, versionId]
            properties:
              clientItemId:
                type: string
              sourceId:
                type: string
                format: uuid
              versionId:
                type: string
                format: uuid
              validationEvidenceReference:
                type: string
                nullable: true
    BulkKnowledgeSourceIdsRequest:
      type: object
      required: [items, reason]
      properties:
        reason:
          type: string
          maxLength: 1000
        approvalReference:
          type: string
          maxLength: 200
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required: [clientItemId, sourceId]
            properties:
              clientItemId:
                type: string
              sourceId:
                type: string
                format: uuid
    BulkKnowledgeMetadataUpdateRequest:
      type: object
      required: [items, reason]
      properties:
        reason:
          type: string
          maxLength: 1000
        approvalReference:
          type: string
          maxLength: 200
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required: [clientItemId, sourceId, metadata]
            properties:
              clientItemId:
                type: string
              sourceId:
                type: string
                format: uuid
              metadata:
                type: object
                properties:
                  ownerUserId:
                    type: string
                    format: uuid
                  jurisdiction:
                    type: string
                  locale:
                    type: string
                  effectiveFrom:
                    type: string
                    format: date
                    nullable: true
                  effectiveTo:
                    type: string
                    format: date
                    nullable: true
                  retentionPolicyKey:
                    type: string
    BulkKnowledgeOperationResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/BulkKnowledgeItemResult"
            requestedCount:
              type: integer
            succeededCount:
              type: integer
            failedCount:
              type: integer
    BulkKnowledgeItemResult:
      type: object
      properties:
        clientItemId:
          type: string
        sourceId:
          type: string
          format: uuid
          nullable: true
        versionId:
          type: string
          format: uuid
          nullable: true
        jobId:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: [Succeeded, Accepted, Failed, Skipped, PolicyDenied]
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorItem"
    CreateKnowledgeVersionRequest:
      type: object
      required: [sourceArtifactReference, contentHash]
      properties:
        sourceArtifactReference:
          type: string
        contentHash:
          type: string
        reason:
          type: string
    PublishKnowledgeVersionRequest:
      allOf:
        - $ref: "#/components/schemas/ReasonRequest"
        - type: object
          required: [validationEvidenceReference]
          properties:
            validationEvidenceReference:
              type: string
    KnowledgeSource:
      type: object
      properties:
        sourceId:
          type: string
          format: uuid
        title:
          type: string
        sourceType:
          type: string
        classification:
          type: string
        status:
          type: string
          enum: [Draft, Validating, Approved, Published, Superseded, Retired]
        currentVersionId:
          type: string
          format: uuid
          nullable: true
    KnowledgeSourceResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/KnowledgeSource"
    KnowledgeSourceListResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/KnowledgeSource"
            page:
              $ref: "#/components/schemas/PageInfo"
    IngestionJobResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/OperationalJob"

    CreateEvaluationRunRequest:
      type: object
      required: [useCaseKey, bundleId, datasetVersion, riskTier, reason]
      properties:
        useCaseKey:
          type: string
        bundleId:
          type: string
          format: uuid
        datasetVersion:
          type: string
        riskTier:
