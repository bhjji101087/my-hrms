openapi: 3.0.3
x-document-status: Approved
x-approved-by: Bhajan Lal (Product Owner)
x-approved-date: 2026-06-22
x-owner-amendment: Provider categories are registry-driven; VectorStore supports Qdrant-first architecture
info:
  title: HRMS Platform Foundational API
  version: 1.2.0
  description: >
    Phase 5 OpenAPI specification for the foundational HRMS platform APIs.
    Covers tenant context, identity/RBAC/ABAC, employees, leave, workflow,
    rules, provider management, search, notifications, and audit. Module-specific
    APIs for attendance, payroll, compliance, AI/RAG, and later modules will be
    documented in separate OpenAPI files.
servers:
  - url: /api/v1
    description: Version 1 API base path
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Identity
  - name: Tenant
  - name: Employees
  - name: Leave
  - name: Workflow
  - name: Rules
  - name: Providers
  - name: Search
  - name: Notifications
  - name: Audit

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Local login
      operationId: login
      security: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded or MFA challenge required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "423":
          description: Account locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
      x-audit-events:
        - AccessLog.LoginAttempt

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue a new access token
      operationId: refreshToken
      security: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
      x-audit-events:
        - AccessLog.TokenRefresh

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current session or refresh token
      operationId: logout
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptySuccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthenticated"
      x-audit-events:
        - AccessLog.Logout

  /auth/sso/{tenant}:
    get:
      tags: [Auth]
      summary: Start tenant SSO login
      operationId: startSso
      security: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - name: tenant
          in: path
          required: true
          schema:
            type: string
          description: Tenant code or verified tenant domain key.
      responses:
        "302":
          description: Redirect to tenant identity provider
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /me:
    get:
      tags: [Identity]
      summary: Current user context
      operationId: getCurrentUserContext
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Current user, tenant, roles, permissions, and ABAC attributes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserContextResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /roles:
    get:
      tags: [Identity]
      summary: List tenant roles
      operationId: listRoles
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Search"
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - Roles.View
    post:
      tags: [Identity]
      summary: Create tenant role
      operationId: createRole
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleRequest"
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
      x-permissions:
        - Roles.Manage
      x-audit-events:
        - Role.Created

  /roles/{roleId}/permissions:
    put:
      tags: [Identity]
      summary: Replace role permissions
      operationId: replaceRolePermissions
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: roleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RolePermissionsRequest"
      responses:
        "200":
          description: Permissions replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      x-permissions:
        - Roles.Manage
      x-audit-events:
        - Role.PermissionsUpdated

  /tenant/current:
    get:
      tags: [Tenant]
      summary: Current tenant profile, branding, features, and provider summary
      operationId: getCurrentTenant
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Tenant context for UI shell and runtime config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantContextResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"

  /tenants/{tenantId}:
    get:
      tags: [Tenant]
      summary: Get tenant administration profile
      operationId: getTenant
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/TenantIdPath"
      responses:
        "200":
          description: Tenant profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      x-permissions:
        - Tenant.View
    put:
      tags: [Tenant]
      summary: Update tenant administration profile
      operationId: updateTenant
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/TenantIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantUpdateRequest"
      responses:
        "200":
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      x-permissions:
        - Tenant.Manage
      x-audit-events:
        - Tenant.Updated

  /tenants/{tenantId}/feature-flags:
    get:
      tags: [Tenant]
      summary: List tenant feature flags and entitlements
      operationId: listTenantFeatureFlags
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/TenantIdPath"
      responses:
        "200":
          description: Feature flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureFlagListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - FeatureFlags.View

  /tenants/{tenantId}/feature-flags/{featureKey}:
    put:
      tags: [Tenant]
      summary: Enable or disable a tenant feature flag
      operationId: updateTenantFeatureFlag
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/TenantIdPath"
        - name: featureKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeatureFlagUpdateRequest"
      responses:
        "200":
          description: Feature flag updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureFlagResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - FeatureFlags.Manage
      x-audit-events:
        - FeatureFlag.Updated

  /tenants/{tenantId}/branding:
    get:
      tags: [Tenant]
      summary: Get tenant branding and white-label settings
      operationId: getTenantBranding
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/TenantIdPath"
      responses:
        "200":
          description: Tenant branding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantBrandingResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - Branding.View
    put:
      tags: [Tenant]
      summary: Update tenant branding and white-label settings
      operationId: updateTenantBranding
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/TenantIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantBrandingRequest"
      responses:
        "200":
          description: Tenant branding updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantBrandingResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - Branding.Manage
      x-audit-events:
        - Branding.Updated

  /tenants/{tenantId}/config-versions:
    get:
      tags: [Tenant]
      summary: List tenant configuration versions
      operationId: listTenantConfigVersions
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/TenantIdPath"
        - name: environment
          in: query
          required: false
          schema:
            type: string
            enum: [Sandbox, Prod]
      responses:
        "200":
          description: Tenant configuration versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantConfigVersionListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - Config.View

  /tenants/{tenantId}/config-promotions:
    post:
      tags: [Tenant]
      summary: Promote tenant configuration from sandbox to production
      operationId: promoteTenantConfig
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/TenantIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantConfigPromotionRequest"
      responses:
        "201":
          description: Tenant configuration promoted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantConfigPromotionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
      x-permissions:
        - Config.Promote
      x-audit-events:
        - Config.Promoted

  /employees:
    get:
      tags: [Employees]
      summary: List employees
      operationId: listEmployees
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Filter"
        - $ref: "#/components/parameters/AsOf"
        - name: department
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Employee page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - People.View
      x-abac:
        - Manager scope restricted by department/location/business unit.
    post:
      tags: [Employees]
      summary: Create employee
      operationId: createEmployee
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeCreateRequest"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
      x-permissions:
        - People.Create
      x-audit-events:
        - Employee.Created
      x-domain-events:
        - EmployeeCreated

  /employees/{employeeId}:
    get:
      tags: [Employees]
      summary: Get employee as of a date
      operationId: getEmployee
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/EmployeeIdPath"
        - $ref: "#/components/parameters/AsOf"
      responses:
        "200":
          description: Employee detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      x-permissions:
        - People.View
    put:
      tags: [Employees]
      summary: Create an effective-dated employee change
      operationId: updateEmployeeEffectiveDated
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/EmployeeIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdateRequest"
      responses:
        "200":
          description: Employee updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
      x-permissions:
        - People.Update
      x-audit-events:
        - Employee.Updated
      x-domain-events:
        - EmployeeUpdated

  /employees/{employeeId}/history:
    get:
      tags: [Employees, Audit]
      summary: Employee effective-dated and audit history
      operationId: getEmployeeHistory
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/EmployeeIdPath"
      responses:
        "200":
          description: Employee history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditChangeListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
      x-permissions:
        - People.View

  /org-chart:
    get:
      tags: [Employees]
      summary: Get organization tree
      operationId: getOrgChart
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - name: rootId
          in: query
          schema:
            type: string
            format: uuid
        - name: depth
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 3
        - $ref: "#/components/parameters/AsOf"
      responses:
        "200":
          description: Organization tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgChartResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - People.View

  /leave/balances:
    get:
      tags: [Leave]
      summary: Get leave balances
      operationId: getLeaveBalances
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - name: employeeId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/AsOf"
      responses:
        "200":
          description: Leave balances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveBalanceListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - Leave.View

  /leave/types:
    get:
      tags: [Leave]
      summary: List tenant-configured leave types
      operationId: listLeaveTypes
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Leave types
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveTypeListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"

  /leave/requests:
    get:
      tags: [Leave]
      summary: List leave requests
      operationId: listLeaveRequests
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: employeeId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Leave requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequestListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - Leave.View
    post:
      tags: [Leave]
      summary: Submit leave request
      operationId: createLeaveRequest
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveRequestCreateRequest"
      responses:
        "201":
          description: Leave request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequestResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/BusinessRuleError"
      x-permissions:
        - Leave.Apply
      x-audit-events:
        - LeaveRequest.Created
      x-domain-events:
        - LeaveRequested

  /leave/requests/{leaveRequestId}/withdraw:
    post:
      tags: [Leave]
      summary: Withdraw leave request
      operationId: withdrawLeaveRequest
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: leaveRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonRequest"
      responses:
        "200":
          description: Leave request withdrawn
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRequestResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
      x-permissions:
        - Leave.Apply
      x-audit-events:
        - LeaveRequest.Withdrawn
      x-domain-events:
        - LeaveWithdrawn

  /workflow/tasks:
    get:
      tags: [Workflow]
      summary: List workflow tasks for current user or delegate context
      operationId: listWorkflowTasks
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: assignee
          in: query
          schema:
            type: string
            enum: [me]
            default: me
        - name: status
          in: query
          schema:
            type: string
            default: pending
      responses:
        "200":
          description: Workflow task page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowTaskListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"

  /workflow/tasks/{taskId}/decision:
    post:
      tags: [Workflow]
      summary: Approve or reject a workflow task
      operationId: decideWorkflowTask
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowDecisionRequest"
      responses:
        "200":
          description: Decision recorded and workflow advanced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDecisionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
      x-audit-events:
        - Workflow.TaskDecision
      x-domain-events:
        - WorkflowTaskDecided

  /workflow/definitions:
    get:
      tags: [Workflow]
      summary: List workflow definitions
      operationId: listWorkflowDefinitions
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - name: key
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Workflow definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDefinitionListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - Workflows.View
    post:
      tags: [Workflow]
      summary: Save workflow definition draft
      operationId: saveWorkflowDefinitionDraft
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowDefinitionRequest"
      responses:
        "201":
          description: Draft saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDefinitionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-permissions:
        - Workflows.Manage
