components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
      description: Optional client correlation id. Server generates one if omitted.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
      description: Required for critical mutating operations.
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 25
    Search:
      name: search
      in: query
      required: false
      schema:
        type: string
    Sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
      description: Comma-separated sort fields, prefix with '-' for descending.
    Filter:
      name: filter
      in: query
      required: false
      schema:
        type: string
      description: Structured filter expression or encoded filter key.
    AsOf:
      name: asOf
      in: query
      required: false
      schema:
        type: string
        format: date
      description: Effective-date query. Defaults to current tenant date.
    TenantIdPath:
      name: tenantId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EmployeeIdPath:
      name: employeeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NotificationIdPath:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthenticated:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: RBAC, ABAC, tenant, entitlement, or feature-flag check failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found or not visible in tenant scope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: Conflict or idempotency conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    BusinessRuleError:
      description: Business rule validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    SuccessEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: object
          additionalProperties: true
    EmptySuccessEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: object
          nullable: true
    ErrorEnvelope:
      type: object
      required: [success, message, errors]
      properties:
        success:
          type: boolean
          enum: [false]
        message:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorItem"
        correlationId:
          type: string
    ErrorItem:
      type: object
      properties:
        field:
          type: string
          nullable: true
        code:
          type: string
        message:
          type: string
    PageMeta:
      type: object
      required: [number, size, total]
      properties:
        number:
          type: integer
        size:
          type: integer
        total:
          type: integer

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        tenantHint:
          type: string
          nullable: true
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          nullable: true
        allSessions:
          type: boolean
          default: false
    AuthTokenResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/AuthTokenData"
    AuthTokenData:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
        mfaRequired:
          type: boolean

    UserContextResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/UserContext"
    UserContext:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        locale:
          type: string
        attributes:
          type: object
          additionalProperties: true

    Role:
      type: object
      properties:
        roleId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        isSystem:
          type: boolean
        permissions:
          type: array
          items:
            type: string
    RoleRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
    RolePermissionsRequest:
      type: object
      required: [permissionKeys]
      properties:
        permissionKeys:
          type: array
          items:
            type: string
    RoleResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/Role"
    RoleListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Role"
            page:
              $ref: "#/components/schemas/PageMeta"

    TenantContextResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: "#/components/schemas/TenantContext"
    TenantContext:
      type: object
      properties:
        tenantId:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        status:
          type: string
        region:
          type: string
        branding:
          type: object
