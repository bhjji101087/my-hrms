<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="560" fill="#f1f5f9"/>
  <!-- left brand panel -->
  <rect x="0" y="0" width="380" height="560" fill="#1e3a5f"/>
  <circle cx="70" cy="70" r="18" fill="#4f8cff"/>
  <text x="98" y="76" fill="#ffffff" font-size="20" font-weight="700">{TenantLogo}</text>
  <text x="50" y="250" fill="#ffffff" font-size="30" font-weight="700">Your People,</text>
  <text x="50" y="290" fill="#ffffff" font-size="30" font-weight="700">One Platform.</text>
  <text x="50" y="330" fill="#9fb6d6" font-size="15">Multi-tenant HRMS · White-labeled per tenant</text>
  <text x="50" y="520" fill="#6f86a6" font-size="12">Theme + logo resolved from tenant config</text>
  <!-- login card -->
  <rect x="500" y="120" width="320" height="330" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="525" y="165" fill="#0f172a" font-size="18" font-weight="700">Sign in to {TenantName}</text>
  <text x="525" y="200" fill="#475569" font-size="12">Email</text>
  <rect x="525" y="210" width="270" height="38" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="537" y="234" fill="#94a3b8" font-size="13">priya@company.com</text>
  <text x="525" y="272" fill="#475569" font-size="12">Password</text>
  <rect x="525" y="282" width="270" height="38" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="537" y="306" fill="#94a3b8" font-size="13">••••••••••••</text>
  <text x="772" y="306" fill="#4f8cff" font-size="11" text-anchor="end">show</text>
  <rect x="525" y="338" width="270" height="40" rx="6" fill="#4f8cff"/>
  <text x="660" y="363" fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle">Sign in</text>
  <line x1="525" y1="398" x2="640" y2="398" stroke="#e2e8f0"/>
  <text x="660" y="402" fill="#94a3b8" font-size="11" text-anchor="middle">or</text>
  <line x1="680" y1="398" x2="795" y2="398" stroke="#e2e8f0"/>
  <rect x="525" y="412" width="270" height="38" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="660" y="436" fill="#334155" font-size="13" font-weight="600" text-anchor="middle">Continue with SSO</text>
  <text x="525" y="475" fill="#4f8cff" font-size="11">Forgot password?</text>
  <text x="795" y="475" fill="#94a3b8" font-size="11" text-anchor="end">MFA if enabled</text>
  <text x="500" y="40" fill="#0f172a" font-size="13" font-weight="700">Screen 1 — Login + Tenant Resolution</text>
</svg>
